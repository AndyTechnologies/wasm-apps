name: CI
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        shell: bash
      - run: pnpm run lint
        shell: bash
        continue-on-error: true
      - run: pnpm -r build
        shell: bash
      - run: pnpm run test
        shell: bash
