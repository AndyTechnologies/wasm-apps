name: CI
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        shell: bash
      - name: Prettier (formato)
        run: pnpm format:check
        shell: bash
      - name: TypeScript build (typecheck + lint)
        run: pnpm -r build
        shell: bash

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        shell: bash
      - run: pnpm -r build
        shell: bash
      - name: Unit tests
        run: pnpm vitest run
        shell: bash

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        shell: bash
      - run: pnpm -r build
        shell: bash
      - name: Integration tests (requires wasmtime + cmake)
        run: pnpm run test:integration
        shell: bash
