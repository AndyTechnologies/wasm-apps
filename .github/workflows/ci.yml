name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        shell: bash
      - name: Check (format + build + tests)
        run: pnpm check
        shell: bash

  unit-tests:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        shell: bash
      - run: pnpm -r build
        shell: bash
      - name: Unit tests
        run: pnpm vitest run
        shell: bash

  integration-tests:
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        shell: bash
      - run: pnpm -r build
        shell: bash
      - name: Cache wasmtime linker
        uses: actions/cache@v4
        with:
          path: ~/.wasm-linker/
          key: wasm-linker-${{ runner.os }}-${{ hashFiles('packages/linker/CMakeLists.txt') }}
      - name: Setup system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake xz-utils
        shell: bash
      - name: Setup system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake xz
        shell: bash
      - name: Setup wasmtime
        run: pnpm run linker setup
        shell: bash
      - name: Integration tests (requires wasmtime + cmake)
        run: pnpm run test:integration
        shell: bash
