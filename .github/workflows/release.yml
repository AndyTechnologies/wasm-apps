name: Release
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'Release v'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install & Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm -r build

      - name: Publish changed packages
        run: |
          PUBLISHED=0
          for pkg in packages/*/; do
            NAME=$(node -p "require('./${pkg}package.json').name")
            VERSION=$(node -p "require('./${pkg}package.json').version")
            PUBLISHED_VER=$(npm view "$NAME" version 2>/dev/null || echo "0.0.0")
            if [ "$VERSION" != "$PUBLISHED_VER" ]; then
              echo "Publishing $NAME@$VERSION (was $PUBLISHED_VER)"
              (cd "$pkg" && npm publish --provenance --access public)
              PUBLISHED=$((PUBLISHED + 1))
            else
              echo "Skipping $NAME@$VERSION (already published)"
            fi
          done
          if [ "$PUBLISHED" -eq 0 ]; then
            >&2 echo "ERROR: No packages had version changes"
            exit 1
          fi
          echo "Published $PUBLISHED package(s)"

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping release"
            exit 0
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --target "${{ github.sha }}"
