name: Release
on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install & Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm -r build

      - name: Check for pending changesets
        id: check
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -vqE '(README|config)'; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm install --no-frozen-lockfile
          pnpm changeset version
          pnpm install --no-frozen-lockfile
          git add -A
          git commit -m "chore: version packages" || true
          git push origin HEAD:changeset-release/main --force

      - name: Create Version PR
        if: steps.check.outputs.has_changesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head changeset-release/main \
            --title "chore: version packages" \
            --body "Version bump via Changesets" \
            --label automated || true

      - name: Publish to npm
        if: steps.check.outputs.has_changesets == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm changeset publish
          echo "Published to npm"

      - name: Get version
        if: steps.check.outputs.has_changesets == 'false'
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        if: steps.check.outputs.has_changesets == 'false'
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if ($0 ~ "^## " ver "$") found=1
              next
            }
            found { print }
          ' packages/cli/CHANGELOG.md > /tmp/release_body.md

      - name: Create GitHub Release
        if: steps.check.outputs.has_changesets == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION ya existe, saltando release"
            exit 0
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file /tmp/release_body.md \
            --target "${{ github.sha }}"
